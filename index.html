<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draexlmaier Logistique</title>

  <!-- Supabase CDN (الإصدار الحالي الشغال) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; margin: 0;}
    .c {max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px;}
    input, select, button {width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px;}
    button {background: #10b981; color: #fff; cursor: pointer;}
    button:hover {background: #059669;}
    .h {display: none;}
    .r {font-weight: bold; padding: 8px 16px; border-radius: 8px; display: inline-block; margin: 10px 0;}
    .agent {background:#94a3b8; color:#000;}
    .chef {background:#60a5fa; color:#fff;}
    .superviseur {background:#f59e0b; color:#fff;}
    .sous-directeur {background:#f87171; color:#fff;}
    .directeur {background:#dc2626; color:#fff;}
    table {width:100%; border-collapse:collapse; margin:20px 0;}
    th, td {border:1px solid #475569; padding:10px; text-align:center;}
    small {color:#94a3b8;}
  </style>
</head>
<body>
<div class="c">
  <h1 style="text-align:center;color:#10b981">Draexlmaier Logistique</h1>

  <!-- Login -->
  <div id="login">
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="password" id="pass" placeholder="Mot de passe" required><br>
    <button onclick="login()">Se connecter</button>
    <small>Mot de passe par défaut : drax123</small>
  </div>

  <!-- First setup -->
  <div id="setup" class="h">
    <h2>Configuration initiale</h2>
    <input type="text" id="full_name" placeholder="Nom complet" required><br>
    <input type="tel" id="phone" placeholder="Téléphone"><br>
    <select id="shift">
      <option>Matin</option>
      <option>Après-midi</option>
      <option>Nuit</option>
    </select><br>
    <input type="text" id="line" placeholder="Ligne (ex: Line 5)" required><br>
    <input type="password" id="np1" placeholder="Nouveau mot de passe" required><br>
    <input type="password" id="np2" placeholder="Confirmer" required><br>
    <button onclick="saveSetup()">Enregistrer</button>
  </div>

  <!-- Dashboard -->
  <div id="dash" class="h">
    <div style="background:#334155;padding:20px;border-radius:12px;text-align:center">
      <h2 id="name"></h2>
      <span id="role" class="r"></span><br>
      <small id="info"></small>
    </div>
    <br>
    <button onclick="out()">Déconnexion</button>
    <div id="admin"></div>
  </div>
</div>

<script>
// غيّر هنا فقط (مشروعك)
const supabaseUrl = "https://arqzqflgzszfzwpvtkip.supabase.co";
const supabaseAnonKey = "sb_publishable_HEmQwOrXpJm38Y2d9_rD1Q_scpmFg0o";

// مفتاح service_role (لإضافة مستخدمين فقط - لا تعطيه للعميل أبدًا في تطبيق حقيقي!)
const serviceKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFycXpxZmxnenN6Znp3cHZ0a2lwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NTIwMTEwMiwiZXhwIjoyMDgwNzc3MTAyfQ.كود_طويل_هنا";

// تصليح نهائي للـ CDN 2025
const { createClient } = supabase;   // هذا السطر هو الصحيح الآن

const supabase = createClient(supabaseUrl, supabaseAnonKey);
const adminClient = createClient(supabaseUrl, serviceKey); // للأدمن فقط

async function login() {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: pass.value
  });
  if (error) alert("Erreur : " + error.message);
  else show(data.user);
}

async function show(user) {
  const { data: profile, error } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if (error || !profile?.full_name) {
    document.getElementById("setup").classList.remove("h");
    document.getElementById("login").classList.add("h");
    return;
  }

  // إظهار الداشبورد
  document.getElementById("login").classList.add("h");
  document.getElementById("dash").classList.remove("h");
  document.getElementById("name").innerText = profile.full_name;

  const roleClass = profile.role.toLowerCase().replace(/ /g, "-").replace(/é/g, "e");
  document.getElementById("role").innerText = profile.role;
  document.getElementById("role").className = "r " + roleClass;

  document.getElementById("info").innerText = 
    `Shift: ${profile.shift} | Ligne: ${profile.production_line} | Tél: ${profile.phone || "-"}`;

  // لو كان مدير أو سوبرفايزر يظهر له لوحة الإدارة
  if (["Superviseur", "Sous-directeur", "Directeur"].includes(profile.role)) {
    loadAdmin();
  }
}

async function saveSetup() {
  if (np1.value !== np2.value) return alert("Les mots de passe ne correspondent pas");
  if (np1.value.length < 6) return alert("Mot de passe trop court (6 caractères minimum)");

  const { data: { user } } = await supabase.auth.getUser();

  // تحديث كلمة المرور + الملف الشخصي
  await supabase.auth.updateUser({ password: np1.value });
  await supabase.from("profiles").upsert({
    id: user.id,
    full_name: full_name.value,
    phone: phone.value,
    shift: shift.value,
    production_line: line.value,
    role: "Agent" // أول تسجيل يكون Agent دائمًا
  });

  alert("Enregistré avec succès ! Reconnectez-vous");
  out();
}

async function loadAdmin() {
  const { data } = await supabase.from("profiles").select("*").order("full_name");
  let html = `<h2>Gestion des utilisateurs</h2>
    <button onclick="addUser()">Ajouter un membre</button>
    <table>
      <tr><th>Nom</th><th>Rôle</th><th>Shift</th><th>Ligne</th><th>Modifier rôle</th></tr>`;

  data.forEach(p => {
    html += `<tr>
      <td>${p.full_name}</td>
      <td>${p.role}</td>
      <td>${p.shift}</td>
      <td>${p.production_line}</td>
      <td>
        <select onchange="changeRole('${p.id}', this.value)">
          <option selected>${p.role}</option>
          <option>Agent</option>
          <option>Chef d'équipe</option>
          <option>Superviseur</option>
          <option>Sous-directeur</option>
          <option>Directeur</option>
        </select>
      </td>
    </tr>`;
  });

  document.getElementById("admin").innerHTML = html + "</table>";
}

async function changeRole(userId, newRole) {
  await supabase.from("profiles").update({ role: newRole }).eq("id", userId);
  loadAdmin();
}

async function addUser() {
  const email = prompt("Email du nouvel utilisateur :");
  if (!email) return;
  const name = prompt("Nom complet :");
  const role = prompt("Rôle (Agent/Chef d'équipe/Superviseur...) :", "Agent");
  const shift = prompt("Shift (Matin/Après-midi/Nuit) :", "Matin");
  const line = prompt("Ligne de production :", "Line 1");

  const { data, error } = await adminClient.auth.admin.createUser({
    email: email,
    password: "drax123",
    email_confirm: true
  });

  if (error) return alert("Erreur : " + error.message);

  await supabase.from("profiles").insert({
    id: data.user.id,
    full_name: name,
    role: role,
    shift: shift,
    production_line: line
  });

  alert("Utilisateur ajouté ! Mot de passe : drax123");
  loadAdmin();
}

function out() {
  supabase.auth.signOut();
  location.reload();
}

// التحقق التلقائي عند التحميل
supabase.auth.onAuthStateChange((event, session) => {
  if (session) show(session.user);
});
</script>
</body>
</html>
